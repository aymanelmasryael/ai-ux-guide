<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEL Academy — Engineering Q&A Knowledge Base</title>
    <link rel="icon" href="ael-logo.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- HEADER (sticky, glassmorphism) -->
    <header class="app-header">
        <div class="header-content">
            <img src="ael-logo.svg" alt="AEL Logo" class="ael-logo">
            <div class="header-titles">
                <h1><span class="ael-text">AEL Academy</span> <span class="bible-text">Engineering Q&A</span></h1>
                <p class="header-subtitle">Complete Reference Knowledge Base</p>
            </div>
        </div>
        <div class="header-actions">
            <button id="show-bookmarks-btn" class="nav-btn">🔖 Bookmarks (<span id="bookmark-count">0</span>)</button>
            <div class="header-stats">
                <span id="stat-prompts">0</span> Questions
            </div>
        </div>
    </header>

    <div class="app-layout">
        <!-- SIDEBAR FILTERS -->
        <aside class="sidebar-filters">
            <h3>Filters</h3>
            
            <div class="filter-group">
                <label>Keyword Search</label>
                <input type="text" id="search-input" placeholder="Search questions, answers, tags...">
            </div>

            <div class="filter-group">
                <label>Difficulty</label>
                <select id="filter-difficulty">
                    <option value="All">All Levels</option>
                    <option value="Beginner">Beginner</option>
                    <option value="Intermediate">Intermediate</option>
                    <option value="Advanced">Advanced</option>
                    <option value="Expert">Expert</option>
                    <option value="Interview">Interview</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Question Type</label>
                <select id="filter-type">
                    <option value="All">All Types</option>
                    <!-- Injected dynamically -->
                </select>
            </div>

            <div class="filter-group">
                <label>Tags & Topics</label>
                <div id="filter-tags" class="tags-container">
                    <!-- Injected dynamically -->
                </div>
            </div>

            <button id="reset-filters" class="reset-btn">Reset Filters</button>
        </aside>

        <!-- MAIN CONTAINER -->
        <main class="main-container">
            <div class="content-header">
                <h2 id="current-view-title">All Questions</h2>
                <div class="global-actions">
                    <button id="expand-all">Expand All</button>
                    <button id="collapse-all">Collapse All</button>
                </div>
            </div>

            <!-- Q&A CARDS AREA -->
            <div id="content-area" class="qa-grid">
                <!-- Injected by JS -->
            </div>
        </main>
    </div>

    <!-- FOOTER -->
    <footer class="app-footer">
        <p>© 2026 Ayman Elmasry — AEL Digital Studio</p>
        <p class="footer-sub">AEL Vision Framework v2.2 — Academy Q&A Specification v1.0</p>
    </footer>

    <!-- Load Data first, then App Logic -->
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
